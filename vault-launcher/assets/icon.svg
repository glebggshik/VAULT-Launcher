<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#0a001f" />
      <stop offset="100%" stop-color="#000000" />
    </radialGradient>
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="50%" stop-color="#a500ff" />
      <stop offset="100%" stop-color="#ff00aa" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" fill="url(#bgGrad)"/>
  <g filter="url(#glow)">
    <text x="256" y="300" font-family="Arial Black, Impact, sans-serif" font-size="520" font-weight="900" fill="url(#neonGrad)" text-anchor="middle" dominant-baseline="middle" stroke="#ffffff" stroke-width="5" stroke-opacity="0.25">V</text>
  </g>
  <text x="256" y="300" font-family="Arial Black, Impact, sans-serif" font-size="520" font-weight="900" fill="none" stroke="url(#neonGrad)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" text-anchor="middle" dominant-baseline="middle" opacity="0.85">V</text>
  <text x="256" y="300" font-family="Arial Black, Impact, sans-serif" font-size="520" font-weight="900" fill="#ffffff" text-anchor="middle" dominant-baseline="middle" opacity="0.45">V</text>
</svg>
